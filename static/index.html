<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV-001 | Professional Image Editor</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fabric.js for HTML5 Canvas manipulation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { background-color: #121212; color: #ffffff; }
        .canvas-container { margin: 0 auto; border: 1px solid #333; background: #1a1a1a; }
        .layer-item { cursor: grab; transition: background 0.2s; }
        .layer-item:hover { background-color: #2a2a2a; }
    </style>
</head>
<body class="h-screen flex flex-col font-sans">
    
    <header class="bg-black p-4 border-b border-gray-800 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-red-500">CV-001 // Image Decomposer</h1>
            <p class="text-xs text-gray-400">By Cypher Vex</p>
        </div>
        <div class="flex gap-4">
            <button id="btn-select-area" class="bg-orange-800 hover:bg-orange-700 px-4 py-2 rounded text-sm transition">Seleccionar Área</button>
            <input type="file" id="uploadImage" class="hidden" accept="image/*" />
            <button onclick="document.getElementById('uploadImage').click()" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded text-sm transition">Toda la Foto</button>
            <input type="file" id="addLayerImage" class="hidden" accept="image/*" />
            <button onclick="document.getElementById('addLayerImage').click()" class="bg-blue-800 hover:bg-blue-700 px-4 py-2 rounded text-sm transition">Añadir Imagen</button>
            <button onclick="downloadPNG()" class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded text-sm transition font-bold">Descargar PNG</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Canvas Area -->
        <div class="flex-1 p-6 flex justify-center items-center bg-zinc-900 overflow-auto relative">
            <div id="loader" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black bg-opacity-80 p-6 rounded-lg shadow-lg z-50">
                <p class="text-red-500 font-mono tracking-widest animate-pulse">PROCESANDO RED NEURONAL...</p>
            </div>
            <canvas id="editor-canvas"></canvas>
        </div>

        <!-- Right Panel: Toolbar & Layers -->
        <aside class="w-80 bg-black border-l border-gray-800 flex flex-col">
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-sm font-semibold uppercase text-gray-500 mb-4">Herramientas de Edición</h2>
                <div id="text-tools" class="hidden flex flex-col gap-2">
                    <input type="text" id="text-input" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm focus:border-red-500 outline-none" placeholder="Texto..." />
                    <div class="flex gap-2">
                        <input type="color" id="text-color" class="w-10 h-8 rounded border-none cursor-pointer" />
                        <input type="number" id="text-size" class="w-full bg-gray-900 border border-gray-700 rounded p-1 text-sm focus:border-red-500 outline-none" placeholder="Tamaño" />
                    </div>
                </div>
                <p id="no-selection" class="text-xs text-gray-500 italic">Selecciona un elemento en el lienzo.</p>
            </div>

            <div class="flex-1 overflow-y-auto p-4 flex flex-col">
                <h2 class="text-sm font-semibold uppercase text-gray-500 mb-4">Gestor de Capas</h2>
                <ul id="layers-list" class="flex flex-col gap-2">
                    <!-- Las capas se inyectarán aquí -->
                </ul>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
